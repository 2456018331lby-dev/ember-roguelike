<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#140f1d" />
  <meta name="description" content="余烬 - 融合卡牌献祭的肉鸽手游。一切皆可交换，死亡皆有意义。" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>余烬 Ember</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <canvas id="game" width="1280" height="720"></canvas>

  <!-- 主菜单 -->
  <div id="menu" class="overlay">
    <div class="panel hero">
      <div class="ember-logo"><div class="ember-flame"></div></div>
      <h1>余 烬</h1>
      <p class="subtitle">一切皆可交换，死亡皆有意义</p>
      <div class="menu-buttons">
        <button id="startBtn" class="btn-primary">⚔ 开始献祭</button>
        <button id="installBtn" class="btn-ghost" hidden>📲 安装到桌面</button>
      </div>
      <div class="menu-stats" style="margin:14px 0 4px;font-size:14px;color:#8c7d6d">🏆 最高分 0 · 最远第 0 波 · 总击杀 0</div>
      <div class="controls-hint">
        <div class="hint-row">📱 左下摇杆移动 · 双击屏幕冲刺</div>
        <div class="hint-row">⌨ WASD 移动 · 空格冲刺 · 自动攻击</div>
      </div>
      <div class="menu-lore">
        在竞技场中存活 25 波。<br>
        每张卡牌都让你变强——也夺走一些东西。<br>
        连续牺牲同一属性三次，将觉醒极端化之力。
      </div>
    </div>
  </div>

  <!-- 奖励选择 -->
  <div id="reward" class="overlay hidden">
    <div class="panel reward-panel">
      <h2>选择献祭奖励</h2>
      <p class="reward-subtitle">每张牌让你变强，也夺走一些东西</p>
      <div id="choices" class="choices"></div>
    </div>
  </div>

  <!-- 游戏结束 -->
  <div id="gameover" class="overlay hidden">
    <div class="panel gameover-panel">
      <h2 id="gameoverTitle">余烬熄灭</h2>
      <div id="finalStats"></div>
      <div class="gameover-buttons">
        <button id="restartBtn" class="btn-primary">🔥 再次点燃</button>
        <button id="backMenuBtn" class="btn-ghost">返回菜单</button>
      </div>
    </div>
  </div>

  <!-- 波次过渡 -->
  <div id="waveSplash" class="wave-splash hidden">第 1 波</div>

  <!-- HUD -->
  <div id="hud">
    <!-- 左上：波次/分数/连击 -->
    <div class="hud-top-left">
      <div class="hud-wave-row">
        <span id="waveText">第 1 / 25 波</span>
        <span id="comboText" class="hud-combo" style="display:none">x0</span>
      </div>
      <div id="scoreText" class="hud-score">分数 0 · 击杀 0</div>
    </div>

    <!-- 顶部：血条+护盾条 -->
    <div class="hp-container">
      <div class="hp-bar-bg">
        <div id="barrierBar" class="barrier-bar" style="display:none"></div>
        <div id="hpBar" class="hp-bar"></div>
      </div>
      <span id="hpText" class="hp-text">100 / 100</span>
    </div>

    <!-- 末日倒计时 -->
    <div id="doomTimer" class="doom-timer" style="display:none">☠ <span id="doomTime">45</span>s</div>

    <!-- 右上：属性面板 -->
    <div id="statsText" class="hud-stats"></div>

    <!-- 左下：消息日志 -->
    <div id="messageLog" class="hud-messages"></div>

    <!-- 右下：冲刺按钮 -->
    <div id="dashIndicator" class="dash-indicator" title="冲刺">
      <svg viewBox="0 0 36 36">
        <circle cx="18" cy="18" r="16" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
        <circle cx="18" cy="18" r="16" fill="none" stroke="#ffd58a" stroke-width="3" stroke-dasharray="100" stroke-dashoffset="0" class="dash-ring"/>
      </svg>
      <span>闪避</span>
    </div>
  </div>

  <!-- 虚拟摇杆 -->
  <div id="joystick"><div id="knob"></div></div>

  <script type="module" src="./src/main.mjs"></script>
</body>
</html>
