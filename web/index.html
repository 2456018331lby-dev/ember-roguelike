<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0e14" />
  <meta name="description" content="余烬 - 献祭构筑肉鸽" />
  <title>余烬 Ember</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <canvas id="game" width="1280" height="720"></canvas>

  <!-- 主菜单 -->
  <div id="menu" class="overlay">
    <div class="panel hero-panel">
      <div class="brand-mark">✦</div>
      <h1>余 烬</h1>
      <p class="subtitle">一切皆可交换，死亡皆有意义</p>
      <div class="menu-buttons">
        <button id="startBtn" class="btn-primary">开始游戏</button>
        <button id="installBtn" class="btn-secondary" hidden>安装到桌面</button>
      </div>
      <div class="menu-meta" id="menuMeta">最高分 0 · 最远第 0 波</div>
      <div class="menu-help">
        <div>手机：左下摇杆移动，双击冲刺</div>
        <div>电脑：WASD / 方向键移动，空格冲刺</div>
      </div>
    </div>
  </div>

  <!-- 角色选择 -->
  <div id="charSelect" class="overlay hidden"></div>

  <!-- 奖励选择 -->
  <div id="reward" class="overlay hidden">
    <div class="panel reward-panel">
      <div class="reward-header">
        <h2>选择一张卡牌</h2>
        <p>强化自己，同时承担代价</p>
      </div>
      <div id="choices" class="choices"></div>
    </div>
  </div>

  <!-- 结束页 -->
  <div id="gameover" class="overlay hidden">
    <div class="panel result-panel">
      <h2 id="gameoverTitle">余烬熄灭</h2>
      <div id="finalStats" class="result-stats"></div>
      <div class="result-actions">
        <button id="restartBtn" class="btn-primary">再来一把</button>
        <button id="backMenuBtn" class="btn-secondary">返回菜单</button>
      </div>
    </div>
  </div>

  <!-- 波次过渡 -->
  <div id="waveSplash" class="wave-splash hidden">第 1 波</div>

  <!-- 教程提示 -->
  <div id="tutorialBox" class="tutorial-box hidden"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-top-left">
      <div class="hud-wave-line">
        <span id="waveText">第 1 / 20 波</span>
        <span id="comboText" class="combo-chip hidden">x3</span>
      </div>
      <div id="scoreText" class="hud-subline">分数 0 · 击杀 0</div>
    </div>

    <div class="hud-top-center">
      <div class="hp-shell">
        <div id="barrierBar" class="barrier-bar hidden"></div>
        <div id="hpBar" class="hp-bar"></div>
      </div>
      <div id="hpText" class="hp-text">100 / 100</div>
    </div>

    <div class="hud-top-right">
      <div id="statsText" class="stats-line">攻击 0 · 攻速 0 · 护甲 0</div>
    </div>

    <div id="messageLog" class="message-log"></div>

    <div id="doomTimer" class="doom-timer hidden">☠ <span id="doomTime">45</span>s</div>

    <button id="dashIndicator" class="dash-button" aria-label="冲刺">
      <span class="dash-ring"></span>
      <span class="dash-label">闪避</span>
    </button>
  </div>

  <!-- 虚拟摇杆 -->
  <div id="joystick" class="joystick"><div id="knob" class="knob"></div></div>

  <!-- 内嵌 SVG 图标资源 -->
  <svg width="0" height="0" style="position:absolute;left:-9999px;top:-9999px" aria-hidden="true">
    <defs>
      <symbol id="icon-player-warrior" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="24" fill="#2f6fed"/>
        <circle cx="32" cy="25" r="10" fill="#0f172a"/>
        <rect x="22" y="37" width="20" height="14" rx="6" fill="#dbeafe"/>
        <circle cx="28" cy="24" r="2" fill="#e0f2fe"/>
        <circle cx="36" cy="24" r="2" fill="#e0f2fe"/>
        <path d="M42 20l8-10 4 3-6 12z" fill="#cbd5e1"/>
      </symbol>
      <symbol id="icon-player-mage" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="24" fill="#8b5cf6"/>
        <path d="M22 46c2-12 18-12 20 0" fill="#ede9fe"/>
        <circle cx="32" cy="24" r="9" fill="#1e1b4b"/>
        <circle cx="28" cy="24" r="2" fill="#f5f3ff"/>
        <circle cx="36" cy="24" r="2" fill="#f5f3ff"/>
        <circle cx="48" cy="16" r="6" fill="#c4b5fd"/>
      </symbol>
      <symbol id="icon-player-rogue" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="24" fill="#f59e0b"/>
        <path d="M18 46c6-10 22-10 28 0" fill="#ffedd5"/>
        <path d="M22 26c2-8 18-8 20 0" fill="#451a03"/>
        <circle cx="28" cy="26" r="2" fill="#fff7ed"/>
        <circle cx="36" cy="26" r="2" fill="#fff7ed"/>
        <path d="M46 18l8-6 2 3-6 8z" fill="#e5e7eb"/>
      </symbol>
      <symbol id="icon-player-necro" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="24" fill="#64748b"/>
        <circle cx="32" cy="24" r="10" fill="#111827"/>
        <rect x="21" y="37" width="22" height="14" rx="6" fill="#e5e7eb"/>
        <circle cx="28" cy="24" r="2" fill="#f8fafc"/>
        <circle cx="36" cy="24" r="2" fill="#f8fafc"/>
        <path d="M44 18l10-10 2 2-8 12z" fill="#cbd5e1"/>
      </symbol>

      <symbol id="icon-slime" viewBox="0 0 64 64">
        <path d="M14 38c0-14 8-22 18-22s18 8 18 22c0 8-8 14-18 14S14 46 14 38z" fill="#22c55e"/>
        <circle cx="25" cy="31" r="4" fill="#f8fafc"/>
        <circle cx="39" cy="31" r="4" fill="#f8fafc"/>
        <circle cx="25" cy="31" r="1.5" fill="#166534"/>
        <circle cx="39" cy="31" r="1.5" fill="#166534"/>
      </symbol>
      <symbol id="icon-bat" viewBox="0 0 64 64">
        <path d="M8 32c8-14 16-12 20-4 4-8 12-10 20 4-8 0-10 6-12 12-4-4-12-4-16 0-2-6-4-12-12-12z" fill="#7c3aed"/>
        <circle cx="28" cy="30" r="2" fill="#fef08a"/>
        <circle cx="36" cy="30" r="2" fill="#fef08a"/>
      </symbol>
      <symbol id="icon-skeleton" viewBox="0 0 64 64">
        <circle cx="32" cy="24" r="12" fill="#e5e7eb"/>
        <rect x="22" y="38" width="20" height="12" rx="6" fill="#d1d5db"/>
        <circle cx="27" cy="24" r="3" fill="#111827"/>
        <circle cx="37" cy="24" r="3" fill="#111827"/>
      </symbol>
      <symbol id="icon-golem" viewBox="0 0 64 64">
        <rect x="14" y="16" width="36" height="36" rx="10" fill="#8b5e3c"/>
        <rect x="20" y="24" width="8" height="8" fill="#fef3c7"/>
        <rect x="36" y="24" width="8" height="8" fill="#fef3c7"/>
        <rect x="24" y="38" width="16" height="4" fill="#5b3a29"/>
      </symbol>
      <symbol id="icon-archer" viewBox="0 0 64 64">
        <circle cx="32" cy="30" r="18" fill="#fb923c"/>
        <path d="M46 20c8 6 8 18 0 24" fill="none" stroke="#fed7aa" stroke-width="3"/>
        <circle cx="27" cy="29" r="2" fill="#fff"/>
        <circle cx="36" cy="29" r="2" fill="#fff"/>
      </symbol>
      <symbol id="icon-healer" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="20" fill="#ec4899"/>
        <rect x="29" y="18" width="6" height="28" fill="#fff"/>
        <rect x="18" y="29" width="28" height="6" fill="#fff"/>
      </symbol>
      <symbol id="icon-summoner" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="20" fill="#6d28d9"/>
        <ellipse cx="32" cy="32" rx="12" ry="8" fill="#ede9fe"/>
        <circle cx="32" cy="32" r="4" fill="#312e81"/>
      </symbol>
      <symbol id="icon-boss" viewBox="0 0 64 64">
        <circle cx="32" cy="34" r="22" fill="#b91c1c"/>
        <path d="M18 18l8-10 6 10M46 18l-8-10-6 10" fill="#7f1d1d"/>
        <circle cx="25" cy="31" r="3" fill="#fde68a"/>
        <circle cx="39" cy="31" r="3" fill="#fde68a"/>
      </symbol>
    </defs>
  </svg>

  <script type="module" src="./src/main.mjs"></script>
</body>
</html>
